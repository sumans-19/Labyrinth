name: DevSecOps Shield Scanner

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Shield Scanner
      id: scanner
      run: |
        # Set pythonpath to find local modules
        export PYTHONPATH=$PYTHONPATH:.
        
        # Scan backend/main.py as a primary example
        # In a real scenario, this could loop through files
        python -m devsecops_shield.main backend/main.py > scan_results.txt
        echo "SCAN_OUTPUT<<EOF" >> $GITHUB_ENV
        cat scan_results.txt >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
        
        # Check if vulnerabilities were found (looking for specific indicator in output)
        if grep -q "AI Detected" scan_results.txt; then
          echo "FOUND_ISSUES=true" >> $GITHUB_ENV
          # Extract the count
          VULN_COUNT=$(grep "AI Detected" scan_results.txt | awk '{print $3}')
          echo "VULN_COUNT=$VULN_COUNT" >> $GITHUB_ENV
        else
          echo "FOUND_ISSUES=false" >> $GITHUB_ENV
        fi

    - name: Create GitHub Issue on Failure
      if: env.FOUND_ISSUES == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python scripts/create_github_issue.py \
          --title "Security Vulnerabilities Detected: ${{ env.VULN_COUNT }} issues Found" \
          --body "The DevSecOps Shield scanner detected security vulnerabilities during the latest push. <br><pre>$(cat scan_results.txt)</pre>" \
          --labels "security,vulnerability,automated"
